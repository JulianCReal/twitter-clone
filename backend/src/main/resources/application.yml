spring:
  application:
    name: twitter-clone-backend

  # Base de datos: H2 en desarrollo, Postgres en producción
  datasource:
    url: jdbc:h2:mem:twitterdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop   # En prod usar: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # OAuth2 Resource Server — Auth0 valida los JWT
  security:
    oauth2:
      resourceserver:
        jwt:
          # Reemplaza con tu dominio de Auth0
          issuer-uri: https://YOUR-AUTH0-DOMAIN.auth0.com/
          audiences: YOUR-AUTH0-API-AUDIENCE

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# Configuración de Auth0 (para OpenAPI security scheme)
auth0:
  domain: YOUR-AUTH0-DOMAIN.auth0.com
  audience: YOUR-AUTH0-API-AUDIENCE

# Configuración de CORS (permite peticiones del frontend)
app:
  cors:
    allowed-origins: http://localhost:3000,https://YOUR-S3-BUCKET.s3-website.amazonaws.com

server:
  port: 8080

---
# Perfil de producción (Postgres)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect