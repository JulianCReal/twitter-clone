spring:
  application:
    name: twitter-clone-backend

  datasource:
    datasource:
      url: jdbc:h2:file:./data/twitterdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-3n1h3z31glrvmnec.us.auth0.com/
          jwk-set-uri: https://dev-3n1h3z31glrvmnec.us.auth0.com/.well-known/jwks.json

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

auth0:
  domain: dev-3n1h3z31glrvmnec.us.auth0.com
  audience: https://api.twitterclone.com

app:
  cors:
    allowed-origins: http://localhost:3000

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect